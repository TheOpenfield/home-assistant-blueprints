blueprint:
  name: Hue Filament Sync PRO (ZHA, LTA005)
  description: >
    Synchronisiert Philips Hue Filament Lampen (ZHA) stabil:
    - On/Off
    - Helligkeit
    - Farbtemperatur

    Loop-safe, robust und optimiert für reale Nutzung.

  domain: automation

  input:
    filament_lights:
      name: Filament Lampen
      selector:
        entity:
          domain: light
          multiple: true

    sync_delay:
      name: Delay (ms)
      default: 150
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: ms
          mode: box

mode: queued
max: 10

variables:
  lights: !input filament_lights
  delay_ms: !input sync_delay

trigger:
  # ON
  - platform: state
    id: turn_on
    entity_id: !input filament_lights
    from: "off"
    to: "on"

  # OFF
  - platform: state
    id: turn_off
    entity_id: !input filament_lights
    from: "on"
    to: "off"

  # Brightness
  - platform: state
    id: brightness
    entity_id: !input filament_lights
    attribute: brightness

  # Color Temp
  - platform: state
    id: color_temp
    entity_id: !input filament_lights
    attribute: color_temp

condition:
  # verhindert Selbst-Trigger
  - condition: template
    value_template: "{{ trigger.to_state.context.id != this.context.id }}"

action:
  - variables:
      source: "{{ trigger.entity_id }}"
      targets: "{{ lights | reject('eq', source) | list }}"

  # nichts tun wenn nur 1 Gerät
  - condition: template
    value_template: "{{ targets | count > 0 }}"

  - choose:

      # ========================
      # ON
      # ========================
      - conditions:
          - condition: trigger
            id: turn_on
        sequence:
          - service: homeassistant.turn_on
            target:
              entity_id: "{{ targets }}"
          - delay:
              milliseconds: "{{ delay_ms }}"

      # ========================
      # OFF
      # ========================
      - conditions:
          - condition: trigger
            id: turn_off
        sequence:
          - service: homeassistant.turn_off
            target:
              entity_id: "{{ targets }}"
          - delay:
              milliseconds: "{{ delay_ms }}"

      # ========================
      # BRIGHTNESS
      # ========================
      - conditions:
          - condition: trigger
            id: brightness
        sequence:
          - variables:
              b: "{{ trigger.to_state.attributes.brightness | default(None) }}"
          - condition: template
            value_template: "{{ b is not none }}"
          - service: light.turn_on
            target:
              entity_id: "{{ targets }}"
            data:
              brightness: "{{ b }}"
          - delay:
              milliseconds: "{{ delay_ms }}"

      # ========================
      # COLOR TEMP
      # ========================
      - conditions:
          - condition: trigger
            id: color_temp
        sequence:
          - variables:
              ct: "{{ trigger.to_state.attributes.color_temp | default(None) }}"
          - condition: template
            value_template: "{{ ct is not none }}"
          - service: light.turn_on
            target:
              entity_id: "{{ targets }}"
            data:
              color_temp: "{{ ct }}"
          - delay:
              milliseconds: "{{ delay_ms }}"